<html>
<head>
    <meta charset="utf-8">
    <title>Voting Form Validation</title>

<style>
body{
    font-family: Verdana;
    background:#e8f0fe;
}

h1{
    text-align:center;
    color:#333;
}

form{
    width:300px;
    margin:auto;
    padding:15px;
    background:#fff;
    border:1px solid #ccc;
}

label{
    font-weight:bold;
}

input{
    width:100%;
    padding:6px;
    margin-top:4px;
}

input[type="submit"]{
    background:#007bff;
    color:white;
    border:none;
    margin-top:10px;
}
</style>

</head>
<body>

<h1>Voting Form Validation</h1>

<form onsubmit="return formValidate()">

<label>NAME: </label><br>
<input type="text" id="name" name="fname" placeholder="Enter your full name"><br><br>

<label>AGE: </label><br>
<input type="number" id="age" name="fage" placeholder="Enter your age"><br><br>

<label>EMAIL: </label><br>
<input type="email" id="email" name="femail" placeholder="Enter your email address"><br><br>

<label>VOTERID: </label><br>
<input type="text" id="vid" name="fid" placeholder="Enter your voter ID"><br><br>

<label>PASSWORD: </label><br>
<input type="password" id="password" name="fpassword" placeholder="Enter your password"><br><br>

<input type="submit" value="Submit">

</form>

<script>
function formValidate(){

   let name = document.getElementById("name").value;
   let age = document.getElementById("age").value;
   let email = document.getElementById("email").value;
   let vid = document.getElementById("vid").value;
   let password = document.getElementById("password").value;

   if(name === "" || age === "" || email === "" || vid === "" || password === ""){
        alert("All fields are required");
        return false;
   }

   if(age < 18){
        alert("Your age is not eligible for voting");
        return false;
   }

   if(vid.length < 10){
        alert("Enter a valid Voter ID (minimum 10 characters)");
        return false;
   }

   if(password.length < 6){
        alert("Password must be at least 6 characters");
        return false;
   }

   alert("Form submitted successfully");
   return true;
}
</script>

</body>
</html>
